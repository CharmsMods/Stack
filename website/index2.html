<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STACK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --yellow: #FFD400;
      --yellow-bright: #FFE44D;
      --dark-bg: #0d0d0d;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--dark-bg);
      color: #fff;
      overflow-x: hidden;
    }

    /* ========== HERO SECTION ========== */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    /* Background Image - CHANGE THIS FILENAME to match your image */
    .bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      filter: blur(8px);
      transform: scale(1.05);
      z-index: 0;
    }

    /* Dark Overlay */
    .dark-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.25);
      z-index: 1;
    }

    /* Hero Content */
    .hero-content {
      position: relative;
      z-index: 2;
      padding: 0 60px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    .stack-title {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(55px, 18vw, 280px);
      font-weight: 700;
      letter-spacing: -0.01em;
      color: transparent;
      -webkit-text-stroke: 2px var(--yellow);
      line-height: 0.9;
      text-shadow: 0 0 80px rgba(255, 212, 0, 0.3), 0 0 120px rgba(255, 212, 0, 0.15);
      animation: titleReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(40px);
    }

    @keyframes titleReveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .scroll-indicator {
      position: absolute;
      bottom: 40px;
      right: 60px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: rgba(255, 255, 255, 0.4);
      font-size: 13px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      z-index: 2;
      animation: fadeInUp 1s ease 0.8s forwards;
      opacity: 0;
    }

    .scroll-indicator svg {
      animation: bounceDown 2s ease-in-out infinite;
    }

    @keyframes bounceDown {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(8px); }
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ========== MENU SECTION ========== */
    .menu-section {
      min-height: 100vh;
      background: var(--yellow);
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 80px 60px;
      position: relative;
    }

    .menu-container {
      max-width: 600px;
      width: 100%;
    }

    .menu-header {
      font-size: clamp(48px, 8vw, 96px);
      font-weight: 400;
      color: #000;
      line-height: 1;
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .menu-header.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .menu-list {
      list-style: none;
      border-top: 1px solid rgba(0, 0, 0, 0.2);
    }

    .menu-item {
      border-bottom: 1px solid rgba(0, 0, 0, 0.2);
      opacity: 0;
      transform: translateX(-20px);
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .menu-item.visible {
      opacity: 1;
      transform: translateX(0);
    }

    .menu-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 0;
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 400;
      color: #000;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }

    .menu-link::after {
      content: '';
      position: absolute;
      bottom: 24px;
      left: 0;
      width: 0;
      height: 2px;
      background: #000;
      transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .menu-link:hover::after {
      width: 100%;
    }

    .menu-link:hover {
      padding-left: 12px;
    }

    .menu-arrow {
      font-size: 24px;
      font-weight: 300;
      transition: transform 0.3s ease;
    }

    .menu-link:hover .menu-arrow {
      transform: translateX(4px);
    }

    .coming-soon {
      font-size: 14px;
      font-weight: 400;
      color: rgba(0, 0, 0, 0.45);
      margin-left: 12px;
    }

    /* Disabled state for coming soon items */
    .menu-item.disabled .menu-link {
      color: rgba(0, 0, 0, 0.5);
      cursor: not-allowed;
    }

    .menu-item.disabled .menu-link::after {
      display: none;
    }

    .menu-item.disabled .menu-link:hover {
      padding-left: 0;
    }

    .menu-item.disabled .menu-arrow {
      opacity: 0.3;
    }

    /* Large decorative element on the right */
    .decorative-letter {
      position: absolute;
      right: 5%;
      bottom: 10%;
      font-size: clamp(200px, 35vw, 600px);
      font-weight: 700;
      color: #000;
      line-height: 0.85;
      opacity: 0.08;
      pointer-events: none;
      user-select: none;
    }

    /* ========== GALLERY SECTION ========== */
    .gallery-section {
      position: relative;
      width: 100%;
      height: 400vh;
      background: #ff5b17;
    }

    .gallery-sticky {
      position: sticky;
      top: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Carousel Cards */
    .gallery-carousel {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      perspective: 1500px;
      transform-style: preserve-3d;
    }

    .gallery-card {
      position: absolute;
      width: clamp(280px, 30vw, 450px);
      aspect-ratio: 4 / 5;
      background: #fff;
      padding: 0;
      box-shadow: 0 30px 60px rgba(0,0,0,0.15);
      border-radius: 12px;
      overflow: hidden;
      /* The pivotal point: bottom of the screen, creating the ferris wheel arc */
      transform-origin: 50% 300%; 
      will-change: transform;
      /* Default position */
      transform: translate3d(0, 0, 0) rotate(0deg);
    }

    .gallery-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    /* UI Overlay */
    .gallery-ui {
      position: absolute;
      bottom: 8%;
      left: 0;
      width: 100%;
      z-index: 20;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .gallery-title {
      font-size: clamp(40px, 6vw, 80px);
      font-weight: 300;
      line-height: 1;
      text-transform: uppercase;
      color: #ffffff;
      letter-spacing: -0.02em;
    }

    .gallery-title .title-top {
      font-weight: 400;
      font-style: italic;
      font-family: serif;
      font-size: 0.35em;
      margin-bottom: 4px;
      letter-spacing: 0;
      text-transform: none;
      color: rgba(255, 255, 255, 0.8);
    }


    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <!-- HERO SECTION -->
  <section class="hero">
    
    <!-- 
      BACKGROUND IMAGE
      Put your image in the same folder as this HTML file 
      and change the src below to match your filename
    -->
    <img src="topbackground.png" alt="" class="bg-image">

    <!-- Dark Overlay -->
    <div class="dark-overlay"></div>

    <!-- Hero Content -->
    <div class="hero-content">
      <h1 class="stack-title">STACK</h1>
    </div>

    <!-- Scroll Indicator -->
    <div class="scroll-indicator">
      <span>Scroll</span>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 5v14M19 12l-7 7-7-7"/>
      </svg>
    </div>
  </section>

  <!-- MENU SECTION -->
  <section class="menu-section">
    <div class="menu-container">
      <h2 class="menu-header" id="menuHeader">Get Started</h2>
      
      <ul class="menu-list">
        <li class="menu-item" style="transition-delay: 0.1s;">
          <a href="https://github.com/CharmsMods/Stack/releases/latest" id="downloadLink" class="menu-link" rel="noopener">
            <span>Download</span>
            <span class="menu-arrow">↗</span>
          </a>
        </li>
        <li class="menu-item" style="transition-delay: 0.2s;">
          <a href="https://discord.gg/xF7e6EzwQT" class="menu-link" target="_blank" rel="noopener">
            <span>Beta Test</span>
            <span class="menu-arrow">↗</span>
          </a>
        </li>
        <li class="menu-item disabled" style="transition-delay: 0.3s;">
          <div class="menu-link">
            <span>Manual<span class="coming-soon">Coming Soon</span></span>
            <span class="menu-arrow">—</span>
          </div>
        </li>
      </ul>
    </div>

    <!-- Decorative Letter -->
    <div class="decorative-letter">S</div>
  </section>

  <!-- GALLERY SECTION -->
  <section class="gallery-section" id="gallery">
    <div class="gallery-sticky">
      <!-- Foreground Scattered Carousel -->
      <div class="gallery-carousel" id="galleryCarousel"></div>

      <!-- UI Overlay (Title) -->
      <div class="gallery-ui">
        <div class="gallery-title" id="galleryTitle">
          <p class="title-top">The</p>
          <p class="title-bottom">Gallery</p>
        </div>
      </div>
    </div>
  </section>


  <script>
    // Scroll animations for menu section
    function setupScrollAnimations() {
      const observerOptions = {
        threshold: 0.3,
        rootMargin: '0px'
      };

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      }, observerOptions);

      const menuHeader = document.getElementById('menuHeader');
      const menuItems = document.querySelectorAll('.menu-item');

      if (menuHeader) observer.observe(menuHeader);
      menuItems.forEach(item => observer.observe(item));
    }

    setupScrollAnimations();

    // GitHub Release auto-download link setup
    const GITHUB_OWNER = "CharmsMods";
    const GITHUB_REPO = "Stack";
    const PREFERRED_ASSET_NAME = "Stack-Windows-x64.zip";
    const INCLUDE_PRERELEASES = true;

    function pickAsset(release) {
      if (!release || !Array.isArray(release.assets)) return null;
      const exact = release.assets.find(asset => asset.name === PREFERRED_ASSET_NAME);
      if (exact) return exact;
      return release.assets.find(asset => /windows|win|x64/i.test(asset.name) && /\.zip$/i.test(asset.name)) ||
             release.assets.find(asset => /\.zip$/i.test(asset.name)) ||
             null;
    }

    async function loadLatestRelease() {
      const downloadLink = document.getElementById("downloadLink");
      if (!downloadLink) return;
      try {
        const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/releases`, {
          headers: { "Accept": "application/vnd.github+json" }
        });

        if (!response.ok) throw new Error(`GitHub returned ${response.status}`);

        const releases = await response.json();
        const release = releases.find(item => !item.draft && (INCLUDE_PRERELEASES || !item.prerelease));

        if (release) {
          const asset = pickAsset(release);
          if (asset && asset.browser_download_url) {
            downloadLink.href = asset.browser_download_url;
          }
        }
      } catch (error) {
        // Fallback to default redirect URL already set in HTML href
      }
    }

    loadLatestRelease();

    // ========== GALLERY LOGIC ==========
    const galleryData = [
      { src: 'composite.png', title: 'Composite' },
      { src: 'edit.png', title: 'Editor' },
      { src: 'raw.png', title: 'RAW Mode' },
      { src: 'topbackground.png', title: 'Top Cover' },
      { src: 'logo.png', title: 'Brand' }
    ];

    const gallerySection = document.getElementById('gallery');
    const carouselContainer = document.getElementById('galleryCarousel');
    const titleBottom = document.querySelector('.title-bottom');

    let cards = [];
    
    // Closer spacing: 30 degrees instead of 72 degrees for a tight circular arc
    const angleStep = 30;

    // Smoothing lag variables (Lerp)
    let targetRotation = 0;
    let currentRotation = 0;
    const ease = 0.07; // Easing factor. Lower = more lag/smoothness

    function initGallery() {
      if(!gallerySection || !carouselContainer) return;

      galleryData.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'gallery-card';
        
        const cardImg = document.createElement('img');
        cardImg.src = item.src;
        cardImg.alt = item.title;
        
        card.appendChild(cardImg);
        carouselContainer.appendChild(card);
        cards.push(card);
      });

      updateGallery(0);
      
      // Listen to scroll and update ONLY targetRotation
      window.addEventListener('scroll', () => {
        const rect = gallerySection.getBoundingClientRect();
        const sectionTop = rect.top;
        const sectionHeight = rect.height;
        const windowHeight = window.innerHeight;

        if (sectionTop > windowHeight || sectionTop < -sectionHeight) {
           return; // out of view
        }

        let progress = 0;
        if (sectionTop <= 0) {
           progress = Math.abs(sectionTop) / (sectionHeight - windowHeight);
        }
        
        progress = Math.max(0, Math.min(1, progress));
        
        // Map scroll progress to a comfortable rotation range so all cards pass through center
        // 5 cards at 30deg step = 120deg span. A 180deg total rotation gives a perfect full sweep.
        targetRotation = progress * 180;
      });

      // Start the smooth animation frame loop
      requestAnimationFrame(animate);
    }

    // Easing update loop
    function animate() {
      if (Math.abs(targetRotation - currentRotation) > 0.01) {
        currentRotation += (targetRotation - currentRotation) * ease;
        updateGallery(currentRotation);
      }
      requestAnimationFrame(animate);
    }

    function updateGallery(globalRotation) {
      if(cards.length === 0) return;

      let closestIndex = 0;
      let minDistance = Infinity;

      cards.forEach((card, index) => {
        // Calculate the card's native angle offset
        const baseAngle = index * angleStep;
        
        // Its current rotation based on wheel progress
        let currentAngle = baseAngle - globalRotation;
        
        // Normalize angle to -180 .. 180 for closest distance check
        let normalizedAngle = currentAngle % 360;
        if (normalizedAngle < -180) normalizedAngle += 360;
        if (normalizedAngle > 180) normalizedAngle -= 360;

        if (Math.abs(normalizedAngle) < minDistance) {
          minDistance = Math.abs(normalizedAngle);
          closestIndex = index;
        }

        // Apply transform
        card.style.transform = `rotate(${currentAngle}deg)`;
      });

      if (titleBottom.textContent !== galleryData[closestIndex].title) {
        titleBottom.textContent = galleryData[closestIndex].title;
      }
    }

    initGallery();
  </script>
</body>
</html>
