<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download STACK</title>
  <meta name="description" content="Download the latest Windows release of STACK. Installer recommended, portable ZIP available.">
  
  <!-- Modern Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #0b0b0b;
      --text-color: #ffffff;
      --accent-color: #ff5b17; /* Sourced from brand */
      --btn-border: rgba(255, 255, 255, 0.3);
      --btn-hover-border: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Minimalist Centered Layout */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    /* Outlined Title style matching original brand */
    .title {
      font-size: clamp(80px, 15vw, 180px);
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1;
      text-transform: uppercase;
      color: transparent;
      -webkit-text-stroke: 1px rgba(255, 255, 255, 0.4);
      margin-bottom: 40px;
      user-select: none;
    }

    /* Outlined Button */
    .download-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 40px;
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-color);
      text-decoration: none;
      border: 1px solid var(--btn-border);
      border-radius: 4px;
      background: transparent;
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
    }

    .download-btn:hover {
      border-color: var(--accent-color);
      background-color: var(--accent-color);
      color: #ffffff;
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(255, 91, 23, 0.2);
    }

    .download-btn:active {
      transform: translateY(0);
    }

    .download-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .download-note {
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.65);
    }

    .release-meta {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }

    .release-status {
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.72);
    }

    .portable-link {
      color: rgba(255, 255, 255, 0.84);
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.18);
      padding-bottom: 2px;
      transition: border-color 0.25s ease, color 0.25s ease;
    }

    .portable-link:hover {
      color: #ffffff;
      border-color: var(--accent-color);
    }

    .utility-links {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    .meta-link {
      color: rgba(255, 255, 255, 0.78);
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.18);
      padding-bottom: 2px;
      transition: border-color 0.25s ease, color 0.25s ease;
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .meta-link:hover {
      color: #ffffff;
      border-color: var(--accent-color);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1 class="title">STACK</h1>
    <div class="download-stack">
      <a href="https://github.com/CharmsMods/Stack/releases/latest" id="downloadLink" class="download-btn" rel="noopener">
        Download Stack for Windows
      </a>
      <div class="download-note">Installer recommended. Portable ZIP available for manual installs.</div>
      <div class="release-meta">
        <div class="release-status" id="releaseStatus">Loading latest release...</div>
        <div class="utility-links">
          <a href="https://github.com/CharmsMods/Stack/releases/latest" id="portableLink" class="portable-link" rel="noopener">
            Download Portable ZIP
          </a>
          <a href="https://github.com/CharmsMods/Stack/releases/latest" id="hashLink" class="meta-link" rel="noopener">
            Download Checksums
          </a>
          <a href="https://github.com/CharmsMods/Stack/releases" id="allReleasesLink" class="meta-link" rel="noopener">
            View All Releases
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const GITHUB_OWNER = "CharmsMods";
    const GITHUB_REPO = "Stack";
    const INSTALLER_PATTERN = /^stacksetup-v?\d+\.\d+\.\d+-win-x64\.exe$/i;
    const PORTABLE_PATTERN = /^stack-v?\d+\.\d+\.\d+-win-x64\.zip$/i;
    const HASH_PATTERN = /^sha256sums(?:\.txt)?$/i;

    function scoreInstaller(assetName) {
      const name = assetName.toLowerCase();
      if (!name.endsWith(".exe")) return -1000;
      let score = 0;
      if (INSTALLER_PATTERN.test(assetName)) score += 100;
      if (name.includes("stacksetup")) score += 50;
      if (name.includes("win") || name.includes("windows")) score += 20;
      if (name.includes("x64")) score += 10;
      if (name.includes("portable") || name.includes("source")) score -= 60;
      return score;
    }

    function scorePortableZip(assetName) {
      const name = assetName.toLowerCase();
      if (!name.endsWith(".zip")) return -1000;
      let score = 0;
      if (PORTABLE_PATTERN.test(assetName)) score += 100;
      if (name.includes("stack")) score += 30;
      if (name.includes("win") || name.includes("windows")) score += 20;
      if (name.includes("x64")) score += 10;
      if (name.includes("source") || name.includes("src")) score -= 80;
      return score;
    }

    function pickBestAsset(release, scorer) {
      if (!release || !Array.isArray(release.assets)) return null;
      let bestAsset = null;
      let bestScore = -1000;
      for (const asset of release.assets) {
        const score = scorer(asset.name || "");
        if (score > bestScore) {
          bestScore = score;
          bestAsset = asset;
        }
      }
      return bestScore >= 0 ? bestAsset : null;
    }

    function pickHashAsset(release) {
      if (!release || !Array.isArray(release.assets)) return null;
      for (const asset of release.assets) {
        if (HASH_PATTERN.test(asset.name || "")) {
          return asset;
        }
      }
      return null;
    }

    function formatReleaseStatus(release) {
      const tag = release.tag_name || "latest release";
      const publishedAt = release.published_at ? new Date(release.published_at) : null;
      if (!publishedAt || Number.isNaN(publishedAt.getTime())) {
        return `Latest release: ${tag}`;
      }

      const formattedDate = publishedAt.toLocaleDateString(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric"
      });
      return `Latest release: ${tag} - ${formattedDate}`;
    }

    async function loadLatestRelease() {
      const downloadLink = document.getElementById("downloadLink");
      const portableLink = document.getElementById("portableLink");
      const hashLink = document.getElementById("hashLink");
      const releaseStatus = document.getElementById("releaseStatus");
      if (!downloadLink) return;
      try {
        const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/releases/latest`, {
          headers: { "Accept": "application/vnd.github+json" }
        });

        if (!response.ok) throw new Error(`GitHub returned ${response.status}`);

        const release = await response.json();
        if (release && !release.draft && !release.prerelease) {
          const installerAsset = pickBestAsset(release, scoreInstaller);
          const portableAsset = pickBestAsset(release, scorePortableZip);
          const hashAsset = pickHashAsset(release);

          if (installerAsset && installerAsset.browser_download_url) {
            downloadLink.href = installerAsset.browser_download_url;
          }
          if (portableLink && portableAsset && portableAsset.browser_download_url) {
            portableLink.href = portableAsset.browser_download_url;
          }
          if (hashLink && hashAsset && hashAsset.browser_download_url) {
            hashLink.href = hashAsset.browser_download_url;
          }
          if (releaseStatus) {
            releaseStatus.textContent = formatReleaseStatus(release);
          }
        }
      } catch (error) {
        if (releaseStatus) {
          releaseStatus.textContent = "Latest release info unavailable. GitHub release page fallback is active.";
        }
      }
    }

    loadLatestRelease();
  </script>
</body>
</html>
