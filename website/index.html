<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download STACK</title>
  <meta name="description" content="Download the latest version of STACK directly. Minimalist, direct download portal.">
  
  <!-- Modern Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #0b0b0b;
      --text-color: #ffffff;
      --accent-color: #ff5b17; /* Sourced from brand */
      --btn-border: rgba(255, 255, 255, 0.3);
      --btn-hover-border: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Minimalist Centered Layout */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    /* Outlined Title style matching original brand */
    .title {
      font-size: clamp(80px, 15vw, 180px);
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1;
      text-transform: uppercase;
      color: transparent;
      -webkit-text-stroke: 1px rgba(255, 255, 255, 0.4);
      margin-bottom: 40px;
      user-select: none;
    }

    /* Outlined Button */
    .download-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 40px;
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-color);
      text-decoration: none;
      border: 1px solid var(--btn-border);
      border-radius: 4px;
      background: transparent;
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
    }

    .download-btn:hover {
      border-color: var(--accent-color);
      background-color: var(--accent-color);
      color: #ffffff;
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(255, 91, 23, 0.2);
    }

    .download-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1 class="title">STACK</h1>
    <a href="https://github.com/CharmsMods/Stack/releases/latest" id="downloadLink" class="download-btn" rel="noopener">
      Download
    </a>
  </div>

  <script>
    // GitHub Release Auto-Download API Link Setup
    const GITHUB_OWNER = "CharmsMods";
    const GITHUB_REPO = "Stack";
    const PREFERRED_ASSET_NAME = "Stack-Windows-x64.zip";
    const INCLUDE_PRERELEASES = true;

    function pickAsset(release) {
      if (!release || !Array.isArray(release.assets)) return null;
      const exact = release.assets.find(asset => asset.name === PREFERRED_ASSET_NAME);
      if (exact) return exact;
      return release.assets.find(asset => /windows|win|x64/i.test(asset.name) && /\.zip$/i.test(asset.name)) ||
             release.assets.find(asset => /\.zip$/i.test(asset.name)) ||
             null;
    }

    async function loadLatestRelease() {
      const downloadLink = document.getElementById("downloadLink");
      if (!downloadLink) return;
      try {
        const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/releases`, {
          headers: { "Accept": "application/vnd.github+json" }
        });

        if (!response.ok) throw new Error(`GitHub returned ${response.status}`);

        const releases = await response.json();
        const release = releases.find(item => !item.draft && (INCLUDE_PRERELEASES || !item.prerelease));

        if (release) {
          const asset = pickAsset(release);
          if (asset && asset.browser_download_url) {
            downloadLink.href = asset.browser_download_url;
          }
        }
      } catch (error) {
        // Fallback to default redirect URL already set in HTML href
      }
    }

    loadLatestRelease();
  </script>
</body>
</html>
